<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EnjoyYourTrip Authentication</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="preloader">
        <div class="loader"></div>
    </div>

    <div id="toastBox"></div>

    <section class="hero-section">

        <div class="container">

            <div class="row justify-content-center align-items-center min-vh-100">

                <div class="col-lg-5">

                    <div class="booking-form-box">

                        <div class="text-center mb-4">

                            <h2 class="fw-bold">

                                <i class="fa-solid fa-compass text-warning"></i>

                                EnjoyYourTrip

                            </h2>

                            <p class="text-muted">

                                Login or create account

                            </p>

                        </div>

                        <div class="d-flex gap-3 mb-4">

                            <button id="loginTab" class="btn btn-dark rounded-pill w-50 fw-bold">

                                Login

                            </button>

                            <button id="signupTab" class="btn btn-warning rounded-pill w-50 fw-bold">

                                Signup

                            </button>

                        </div>

                        <form id="loginForm">

                            <div class="mb-4">

                                <input type="email" id="loginEmail" class="form-control travel-input"
                                    placeholder="Email Address" required>

                            </div>

                            <div class="mb-4">

                                <input type="password" id="loginPassword" class="form-control travel-input"
                                    placeholder="Password" required>

                            </div>

                            <button type="submit" class="booking-btn">

                                Login Account

                            </button>

                        </form>

                        <form id="signupForm" style="display:none;">

                            <div class="mb-4">

                                <input type="text" id="signupName" class="form-control travel-input"
                                    placeholder="Full Name" required>

                            </div>

                            <div class="mb-4">

                                <input type="email" id="signupEmail" class="form-control travel-input"
                                    placeholder="Email Address" required>

                            </div>

                            <div class="mb-4">

                                <input type="password" id="signupPassword" class="form-control travel-input"
                                    placeholder="Password" required>

                            </div>

                            <button type="submit" class="booking-btn">

                                Create Account

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script>

        setTimeout(() => {

            document.getElementById("preloader")
                .style.display = "none";

        }, 700);

        function showToast(message) {

            const toastBox =
                document.getElementById("toastBox");

            const toast =
                document.createElement("div");

            toast.className = "custom-toast";

            toast.innerText = message;

            toastBox.appendChild(toast);

            setTimeout(() => {

                toast.remove();

            }, 2500);

        }

        const loginTab =
            document.getElementById("loginTab");

        const signupTab =
            document.getElementById("signupTab");

        const loginForm =
            document.getElementById("loginForm");

        const signupForm =
            document.getElementById("signupForm");

        loginTab.addEventListener("click", () => {

            loginForm.style.display = "block";
            signupForm.style.display = "none";

        });

        signupTab.addEventListener("click", () => {

            signupForm.style.display = "block";
            loginForm.style.display = "none";

        });

        signupForm.addEventListener("submit", function (e) {

            e.preventDefault();

            const user = {

                name:
                    document.getElementById("signupName").value,

                email:
                    document.getElementById("signupEmail").value,

                password:
                    document.getElementById("signupPassword").value

            };

            localStorage.setItem(
                "travelUserData",
                JSON.stringify(user)
            );

            showToast("Account Created Successfully!");

            setTimeout(() => {

                signupForm.style.display = "none";
                loginForm.style.display = "block";

            }, 1500);

        });

        loginForm.addEventListener("submit", function (e) {

            e.preventDefault();

            const savedUser =
                JSON.parse(localStorage.getItem("travelUserData"));

            const email =
                document.getElementById("loginEmail").value;

            const password =
                document.getElementById("loginPassword").value;

            if (

                savedUser &&
                savedUser.email === email &&
                savedUser.password === password

            ) {

                localStorage.setItem(
                    "travelUserLoggedIn",
                    "true"
                );

                showToast("Login Successful!");

                setTimeout(() => {

                    window.location.href = "index.html";

                }, 1500);

            } else {

                showToast("Invalid Email or Password");

            }

        });

    </script>

</body>

</html>
